<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página não encontrada — Handify</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;0,900;1,400&display=swap" rel="stylesheet">
<style>
:root{--blue:#5288EF;--green:#A8E8A9;--black:#0F0F0F;--gray-dark:#2D2D2D;--gray-mid:#6B7280;--off-white:#F5F5F0;--yellow:#F5CE3E;--white:#FFFFFF}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Montserrat',Arial,sans-serif;background:var(--off-white);color:var(--gray-dark);font-size:16px;line-height:1.7;min-height:100vh;display:flex;flex-direction:column}
.brand-stripe{height:6px;background:linear-gradient(90deg,var(--blue) 33.3%,var(--green) 33.3% 66.6%,var(--yellow) 66.6%)}
.nav{display:flex;align-items:center;justify-content:space-between;padding:18px 60px;border-bottom:1px solid rgba(0,0,0,0.08);background:var(--white);box-shadow:0 1px 12px rgba(0,0,0,0.05)}
.nav-brand{font-size:22px;font-weight:900;letter-spacing:-0.5px;color:var(--black);text-decoration:none}
.nav-brand span{color:var(--blue)}
.hero-404{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 24px}
.num-404{font-size:clamp(96px,15vw,180px);font-weight:900;color:var(--blue);line-height:1;letter-spacing:-4px;opacity:.15;margin-bottom:-20px}
.icon-404{font-size:64px;margin-bottom:24px}
h1{font-size:clamp(24px,3vw,36px);font-weight:900;color:var(--black);margin-bottom:14px;letter-spacing:-0.5px}
.subtitle{font-size:16px;color:var(--gray-mid);max-width:480px;margin:0 auto 40px}
.btn-group{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.btn{display:inline-block;text-decoration:none;font-size:14px;font-weight:800;padding:13px 28px;border-radius:8px;letter-spacing:.02em;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-blue{background:var(--blue);color:var(--white)}
.btn-outline{background:transparent;color:var(--gray-dark);border:2px solid rgba(0,0,0,0.15)}
footer{background:var(--black);color:var(--white);padding:24px 60px;text-align:center}
footer p{font-size:12px;color:rgba(255,255,255,0.35)}
@media(max-width:768px){.nav{padding:16px 24px}}
.nav-toggle{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:4px;z-index:101}.nav-toggle span{display:block;width:22px;height:2px;background:var(--black);border-radius:2px;transition:transform .2s,opacity .2s}.nav-toggle.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}.nav-toggle.open span:nth-child(2){opacity:0}.nav-toggle.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
</style>
</head>
<body>
<div class="brand-stripe"></div>
<nav class="nav">
  <a href="index.html" class="nav-brand">HANDIFY<span>.</span></a>
</nav>

<div class="hero-404">
  <div class="num-404">404</div>
  <div class="icon-404">🕯️</div>
  <h1>Essa página apagou a chama.</h1>
  <p class="subtitle">O endereço que você acessou não existe mais — ou nunca existiu. Mas temos muito mais por aqui.</p>
  <div class="btn-group">
    <a href="index.html" class="btn btn-blue">Ir para o início →</a>
    <a href="cursos.html" class="btn btn-outline">Ver todos os cursos</a>
  </div>
</div>

<footer>
  <p>© 2026 Handify™ · Todos os direitos reservados</p>
</footer>
<script>document.getElementById('navToggle').addEventListener('click',function(){this.classList.toggle('open');document.getElementById('navLinks').classList.toggle('open');});</script>
</body>
</html>
